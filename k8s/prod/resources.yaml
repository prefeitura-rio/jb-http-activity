---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: jb-http-activity
  annotations:
    iam.gke.io/gcp-service-account: jb-http-activity-sa@rj-crm-registry.iam.gserviceaccount.com
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: jb-http-activity
  annotations:
    secrets.infisical.com/auto-reload: "true"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: jb-http-activity
  template:
    metadata:
      labels:
        app: jb-http-activity
    spec:
      serviceAccountName: jb-http-activity
      containers:
        - name: app
          image: ghcr.io/prefeitura-rio/jb-http-activity:latest
          envFrom:
            - secretRef:
                name: jb-http-secrets
          ports:
            - containerPort: 8080
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 6
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            successThreshold: 1
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 0
            periodSeconds: 5
            timeoutSeconds: 5
            failureThreshold: 24
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: jb-http-activity
spec:
  ports:
    - port: 80
      targetPort: 8080
  selector:
    app: jb-http-activity
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: jb-http-activity-pdb
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: jb-http-activity
---
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: jb-http-activity
spec:
  scaleTargetRef:
    name: jb-http-activity
  minReplicaCount: 2
  maxReplicaCount: 10
  triggers:
    - type: memory
      metadata:
        type: Utilization
        value: "70"
