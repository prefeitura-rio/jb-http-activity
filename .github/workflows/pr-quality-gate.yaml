name: PR Quality Gate

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - main

jobs:
  lint:
    name: Dockerfile Linting
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Hadolint (Dockerfile linter)
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile
          failure-threshold: warning

  security-scan:
    name: Security Scanning
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy (Vulnerability Scanning)
        id: trivy
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          format: table
          output: trivy-results.txt
          severity: CRITICAL,HIGH
          exit-code: '0'

      - name: Format Trivy results
        if: always()
        id: format
        run: |
          if [ -s trivy-results.txt ]; then
            RESULTS=$(cat trivy-results.txt)
            if echo "$RESULTS" | grep -qE "CRITICAL|HIGH"; then
              STATUS="❌ Vulnerabilidades encontradas"
            else
              STATUS="✅ Nenhuma vulnerabilidade CRITICAL ou HIGH encontrada"
            fi
          else
            RESULTS="Nenhum resultado."
            STATUS="✅ Nenhuma vulnerabilidade CRITICAL ou HIGH encontrada"
          fi
          echo "status=$STATUS" >> $GITHUB_OUTPUT
          {
            echo 'results<<EOF'
            echo "$RESULTS"
            echo 'EOF'
          } >> $GITHUB_OUTPUT

      - name: Find previous security comment
        uses: peter-evans/find-comment@v2
        id: find-comment
        with:
          issue-number: ${{ github.event.pull_request.number }}
          comment-author: 'github-actions[bot]'
          body-includes: '<!-- trivy-security-scan -->'

      - name: Create or update security comment
        uses: peter-evans/create-or-update-comment@v3
        with:
          comment-id: ${{ steps.find-comment.outputs.comment-id }}
          issue-number: ${{ github.event.pull_request.number }}
          edit-mode: replace
          body: |
            <!-- trivy-security-scan -->
            ## 🔒 Security Scanning (Trivy)

            ${{ steps.format.outputs.status }}

            <details>
            <summary>Ver resultado completo</summary>

            ```
            ${{ steps.format.outputs.results }}
            ```

            </details>

            > Scan: `CRITICAL` e `HIGH` · Commit: `${{ github.sha }}`

      - name: Fail if vulnerabilities found
        if: always()
        run: |
          if grep -qE "CRITICAL|HIGH" trivy-results.txt 2>/dev/null; then
            echo "Vulnerabilidades CRITICAL ou HIGH encontradas. Verifique o comentário no PR."
            exit 1
          fi

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Compile TypeScript
        run: npx tsc

      - name: Type check
        run: npx tsc --noEmit

      - name: Run tests
        run: npm test
