name: Deploy to Staging

on:
  push:
    branches:
      - staging

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: staging
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u $GITHUB_ACTOR --password-stdin

      - name: Extract metadata
        id: meta
        run: |
          COMMIT_HASH=${{ github.sha }}
          SHORT_HASH=$(git rev-parse --short HEAD)
          IMAGE_NAME="ghcr.io/${{ github.repository_owner }}/jb-http-activity"
          echo "IMAGE_NAME=$IMAGE_NAME" >> $GITHUB_ENV
          echo "COMMIT_HASH=$COMMIT_HASH" >> $GITHUB_ENV
          echo "SHORT_HASH=$SHORT_HASH" >> $GITHUB_ENV

      - name: Build and push Docker image
        run: |
          docker buildx build \
            --platform linux/amd64 \
            --build-arg SFMC_ACTIVITY_KEY=${{ secrets.SFMC_ACTIVITY_KEY_STAGING }} \
            --build-arg VITE_BASE_PATH=/jb-http-activity/ \
            --tag $IMAGE_NAME:$COMMIT_HASH \
            --push .

      - name: Get image digest
        id: digest
        run: |
          DIGEST=$(docker buildx imagetools inspect $IMAGE_NAME:$COMMIT_HASH --format '{{.Manifest.Digest}}' | grep -oE 'sha256:[a-f0-9]+' | head -n1)
          echo "DIGEST=$DIGEST" >> $GITHUB_ENV
          echo "Image digest: $DIGEST"

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.GCP_CREDENTIALS_JSON }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v3
        with:
          project_id: ${{ vars.GCP_PROJECT_ID }}

      - name: Install gke-gcloud-auth-plugin
        run: gcloud components install gke-gcloud-auth-plugin

      - name: Install kubectl
        uses: azure/setup-kubectl@v5
        with:
          version: latest

      - name: Configure kubectl for GKE
        run: gcloud container clusters get-credentials application --zone=us-central1 --project="${{ vars.GCP_PROJECT_ID }}"

      - name: Update ArgoCD Application image
        run: |
          kubectl patch application jb-http-activity-staging -n argocd --type=merge \
            -p="{\"spec\":{\"source\":{\"kustomize\":{\"images\":[\"$IMAGE_NAME:$COMMIT_HASH@$DIGEST\"]}}}}"

      - name: Wait for ArgoCD sync
        timeout-minutes: 10
        run: |
          for i in {1..60}; do
            SYNC_STATUS=$(kubectl get application jb-http-activity-staging -n argocd -o jsonpath='{.status.sync.status}' 2>/dev/null || echo "")
            echo "Attempt $i/60: ArgoCD Sync=$SYNC_STATUS"
            if [ "$SYNC_STATUS" = "Synced" ]; then
              echo "ArgoCD sync complete"
              break
            fi
            if [ $i -eq 60 ]; then
              echo "Timeout waiting for ArgoCD sync"
              kubectl get application jb-http-activity-staging -n argocd -o yaml
              exit 1
            fi
            sleep 5
          done

      - name: Verify deployment
        run: |
          kubectl rollout status deployment/jb-http-activity -n jb-http-activity-staging --timeout=5m

      - name: Create deployment summary
        if: always()
        run: |
          echo "## jb-http-activity (staging) Deployment" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Commit**: $SHORT_HASH" >> $GITHUB_STEP_SUMMARY
          echo "**Image**: \`$IMAGE_NAME:$COMMIT_HASH@${DIGEST:0:12}...\`" >> $GITHUB_STEP_SUMMARY
          echo "**K8s**: k8s/staging/" >> $GITHUB_STEP_SUMMARY
          if [ "${{ job.status }}" = "success" ]; then
            echo "### Deploy to Staging Successful" >> $GITHUB_STEP_SUMMARY
          else
            echo "### Deploy to Staging Failed" >> $GITHUB_STEP_SUMMARY
          fi
