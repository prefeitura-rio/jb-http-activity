name: Deploy to Staging

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: staging
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check if k8s-only changes
        id: check-k8s-only
        run: |
          CHANGED_FILES=$(git diff --name-only ${{ github.event.before }} ${{ github.sha }})
          NON_K8S_FILES=$(echo "$CHANGED_FILES" | grep -v "^k8s/" || true)
          if [ -z "$NON_K8S_FILES" ] && [ -n "$CHANGED_FILES" ]; then
            echo "k8s_only=true" >> $GITHUB_OUTPUT
          else
            echo "k8s_only=false" >> $GITHUB_OUTPUT
          fi

      - name: Set up Docker Buildx
        if: steps.check-k8s-only.outputs.k8s_only != 'true'
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: steps.check-k8s-only.outputs.k8s_only != 'true'
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u $GITHUB_ACTOR --password-stdin

      - name: Extract metadata
        if: steps.check-k8s-only.outputs.k8s_only != 'true'
        run: |
          echo "IMAGE_NAME=ghcr.io/${{ github.repository_owner }}/jb-http-activity" >> $GITHUB_ENV
          echo "COMMIT_HASH=${{ github.sha }}" >> $GITHUB_ENV

      - name: Build and push Docker image
        if: steps.check-k8s-only.outputs.k8s_only != 'true'
        run: |
          docker buildx build \
            --platform linux/amd64 \
            --build-arg SFMC_ACTIVITY_KEY=${{ secrets.SFMC_ACTIVITY_KEY_STAGING }} \
            --tag $IMAGE_NAME:latest \
            --tag $IMAGE_NAME:$COMMIT_HASH \
            --push .

      - name: Get image digest
        if: steps.check-k8s-only.outputs.k8s_only != 'true'
        run: |
          DIGEST=$(docker buildx imagetools inspect $IMAGE_NAME:latest --format '{{.Manifest.Digest}}' | grep -oE 'sha256:[a-f0-9]+' | head -n1)
          echo "DIGEST=$DIGEST" >> $GITHUB_ENV

      - name: Authenticate to Google Cloud
        if: steps.check-k8s-only.outputs.k8s_only != 'true'
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_CREDENTIALS_JSON }}

      - name: Set up Cloud SDK
        if: steps.check-k8s-only.outputs.k8s_only != 'true'
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ vars.GCP_PROJECT_ID }}

      - name: Install gke-gcloud-auth-plugin
        if: steps.check-k8s-only.outputs.k8s_only != 'true'
        run: gcloud components install gke-gcloud-auth-plugin

      - name: Install kubectl
        if: steps.check-k8s-only.outputs.k8s_only != 'true'
        uses: azure/setup-kubectl@v3
        with:
          version: latest

      - name: Configure kubectl for GKE
        if: steps.check-k8s-only.outputs.k8s_only != 'true'
        run: gcloud container clusters get-credentials application --zone=us-central1 --project="${{ vars.GCP_PROJECT_ID }}"

      - name: Update ArgoCD Application image
        if: steps.check-k8s-only.outputs.k8s_only != 'true'
        run: |
          kubectl patch application jb-http-activity -n argocd --type=merge \
            -p="{\"spec\":{\"source\":{\"kustomize\":{\"images\":[\"$IMAGE_NAME:latest@$DIGEST\"]}}}}"

      - name: Wait for ArgoCD sync
        if: steps.check-k8s-only.outputs.k8s_only != 'true'
        timeout-minutes: 10
        run: |
          for i in {1..60}; do
            SYNC_STATUS=$(kubectl get application jb-http-activity -n argocd -o jsonpath='{.status.sync.status}' 2>/dev/null || echo "")
            HEALTH_STATUS=$(kubectl get application jb-http-activity -n argocd -o jsonpath='{.status.health.status}' 2>/dev/null || echo "")
            echo "Attempt $i/60: Sync=$SYNC_STATUS Health=$HEALTH_STATUS"
            if [ "$SYNC_STATUS" = "Synced" ] && [ "$HEALTH_STATUS" = "Healthy" ]; then
              echo "Staging deploy complete"
              break
            fi
            if [ $i -eq 60 ]; then
              echo "Timeout waiting for ArgoCD sync"
              kubectl get application jb-http-activity -n argocd -o yaml
              exit 1
            fi
            sleep 5
          done

      - name: Verify deployment
        if: steps.check-k8s-only.outputs.k8s_only != 'true'
        run: |
          kubectl rollout status deployment/jb-http-activity -n jb-http-activity --timeout=5m

      - name: Send Discord notification
        if: always() && steps.check-k8s-only.outputs.k8s_only != 'true'
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          if [ -z "$DISCORD_WEBHOOK" ]; then
            echo "Discord webhook not configured, skipping notification"
            exit 0
          fi

          COMMIT_MSG=$(git log -1 --pretty=format:'%s' ${{ github.sha }})
          COMMIT_AUTHOR=$(git log -1 --pretty=format:'%an' ${{ github.sha }})
          COMMIT_URL="https://github.com/${{ github.repository }}/commit/${{ github.sha }}"

          if [ "${{ job.status }}" = "success" ]; then
            STATUS_EMOJI="✅"
            STATUS_TEXT="Succeeded"
            COLOR="3066993"
            DESCRIPTION="Staging deployment complete."
          else
            STATUS_EMOJI="❌"
            STATUS_TEXT="Failed"
            COLOR="15158332"
            DESCRIPTION="Staging deployment failed."
          fi

          DISCORD_PAYLOAD=$(cat <<EOF
          {
            "embeds": [{
              "title": "${STATUS_EMOJI} jb-http-activity Staging ${STATUS_TEXT}",
              "description": "${DESCRIPTION}",
              "color": ${COLOR},
              "fields": [
                {"name": "📝 Commit", "value": "[${COMMIT_MSG:0:50}](${COMMIT_URL})", "inline": false},
                {"name": "👤 Author", "value": "${COMMIT_AUTHOR}", "inline": true},
                {"name": "🐳 Image", "value": "\`$IMAGE_NAME:$COMMIT_HASH\`", "inline": false}
              ],
              "timestamp": "$(date -u +%Y-%m-%dT%H:%M:%S.000Z)",
              "footer": {"text": "GitHub Actions"}
            }]
          }
          EOF
          )
          curl -s -X POST "$DISCORD_WEBHOOK" -H "Content-Type: application/json" -d "$DISCORD_PAYLOAD"
