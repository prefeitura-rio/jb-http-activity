name: Release and Deploy to Production

on:
  release:
    types: [published]

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u $GITHUB_ACTOR --password-stdin

      - name: Extract release version
        env:
          RELEASE_TAG: ${{ github.ref_name }}
          REPO_OWNER: ${{ github.repository_owner }}
        run: |
          VERSION="$RELEASE_TAG"
          VERSION_NO_V=${VERSION#v}
          COMMIT_HASH=$(git rev-parse --short HEAD)
          echo "IMAGE_NAME=ghcr.io/$REPO_OWNER/jb-http-activity" >> $GITHUB_ENV
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "VERSION_NO_V=$VERSION_NO_V" >> $GITHUB_ENV
          echo "COMMIT_HASH=$COMMIT_HASH" >> $GITHUB_ENV

      - name: Build and push Docker image
        run: |
          docker buildx build \
            --platform linux/amd64 \
            --no-cache \
            --build-arg SFMC_ACTIVITY_KEY=${{ secrets.SFMC_ACTIVITY_KEY_PRODUCTION }} \
            --build-arg SFMC_ACTIVITY_NAME="HTTP Request" \
            --build-arg SFMC_BASE_URL=https://services.pref.rio/jb-http-activity \
            --build-arg VITE_BASE_PATH=/jb-http-activity/ \
            --tag $IMAGE_NAME:$VERSION \
            --tag $IMAGE_NAME:$VERSION_NO_V \
            --tag $IMAGE_NAME:latest-release \
            --push .

      - name: Get image digest
        run: |
          DIGEST=$(docker buildx imagetools inspect $IMAGE_NAME:$VERSION --format '{{.Manifest.Digest}}' | grep -oE 'sha256:[a-f0-9]+' | head -n1)
          echo "DIGEST=$DIGEST" >> $GITHUB_ENV

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WIF_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ vars.GCP_PROJECT_ID }}

      - name: Install gke-gcloud-auth-plugin
        run: gcloud components install gke-gcloud-auth-plugin

      - name: Install kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: latest

      - name: Configure kubectl for GKE
        run: gcloud container clusters get-credentials --dns-endpoint application --zone=us-central1 --project="${{ vars.GCP_PROJECT_ID }}"

      - name: Update ArgoCD Application image
        run: |
          kubectl patch application jb-http-activity -n argocd --type=merge \
            -p="{\"spec\":{\"source\":{\"kustomize\":{\"images\":[\"$IMAGE_NAME:$VERSION@$DIGEST\"]}}}}"

      - name: Wait for ArgoCD sync
        timeout-minutes: 10
        run: |
          for i in {1..60}; do
            SYNC_STATUS=$(kubectl get application jb-http-activity -n argocd -o jsonpath='{.status.sync.status}' 2>/dev/null || echo "")
            HEALTH_STATUS=$(kubectl get application jb-http-activity -n argocd -o jsonpath='{.status.health.status}' 2>/dev/null || echo "")
            echo "Attempt $i/60: Sync=$SYNC_STATUS Health=$HEALTH_STATUS"
            if [ "$SYNC_STATUS" = "Synced" ] && [ "$HEALTH_STATUS" = "Healthy" ]; then
              echo "Production deploy complete"
              break
            fi
            if [ $i -eq 60 ]; then
              echo "Timeout waiting for ArgoCD sync"
              kubectl get application jb-http-activity -n argocd -o yaml
              exit 1
            fi
            sleep 5
          done

      - name: Verify deployment
        run: |
          kubectl rollout status deployment/jb-http-activity -n jb-http-activity --timeout=5m

      - name: Create deployment summary
        if: always()
        run: |
          echo "## jb-http-activity (prod) Deployment" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Release**: $VERSION" >> $GITHUB_STEP_SUMMARY
          echo "**Image**: \`$IMAGE_NAME:$VERSION@${DIGEST:0:19}...\`" >> $GITHUB_STEP_SUMMARY
          echo "**K8s**: k8s/prod/" >> $GITHUB_STEP_SUMMARY
          if [ "${{ job.status }}" = "success" ]; then
            echo "### Deploy to Production Successful" >> $GITHUB_STEP_SUMMARY
          else
            echo "### Deploy to Production Failed" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Send Discord notification
        if: always()
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          if [ -z "$DISCORD_WEBHOOK" ]; then
            echo "Discord webhook not configured, skipping notification"
            exit 0
          fi

          COMMIT_MSG=$(git log -1 --pretty=format:'%s')
          COMMIT_AUTHOR=$(git log -1 --pretty=format:'%an')
          COMMIT_URL="https://github.com/${{ github.repository }}/releases/tag/$VERSION"

          if [ "${{ job.status }}" = "success" ]; then
            STATUS_EMOJI="✅"
            STATUS_TEXT="Succeeded"
            COLOR="3066993"
            DESCRIPTION="Production deployment complete."
          else
            STATUS_EMOJI="❌"
            STATUS_TEXT="Failed"
            COLOR="15158332"
            DESCRIPTION="Production deployment failed."
          fi

          DISCORD_PAYLOAD=$(cat <<EOF
          {
            "embeds": [{
              "title": "${STATUS_EMOJI} jb-http-activity Production ${STATUS_TEXT}",
              "description": "${DESCRIPTION}",
              "color": ${COLOR},
              "fields": [
                {"name": "🏷️ Release", "value": "[$VERSION]($COMMIT_URL)", "inline": true},
                {"name": "👤 Author", "value": "${COMMIT_AUTHOR}", "inline": true},
                {"name": "🐳 Image", "value": "\`$IMAGE_NAME:$VERSION\`", "inline": false}
              ],
              "timestamp": "$(date -u +%Y-%m-%dT%H:%M:%S.000Z)",
              "footer": {"text": "GitHub Actions"}
            }]
          }
          EOF
          )
          curl -s -X POST "$DISCORD_WEBHOOK" -H "Content-Type: application/json" -d "$DISCORD_PAYLOAD"
